name: Windows Server2019 P100 静态编译 (CUDA11.8 sm60)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v5

      - name: 安装 CUDA 11.8（P100 专用）
        run: choco install cuda --version=11.8.0 -y && refreshenv
        shell: pwsh

      - name: 安装 CMake
        run: choco install cmake -y && refreshenv
        shell: pwsh

      - name: CMake 构建（静态 + P100 专属）
        run: |
          cmake -B build -S . `
          -DLLAMA_CUDA=ON `
          -DCMAKE_CUDA_ARCHITECTURES=60 `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_SHARED_LIBS=OFF `
          -DLLAMA_STATIC=ON `
          -DLLAMA_BUILD_SERVER=ON
        shell: pwsh

      - name: 编译
        run: cmake --build build --config Release -j4
        shell: pwsh

      - name: 打包静态 exe
        run: |
          mkdir dist
          copy build\bin\Release\*.exe dist\
          copy convert-hf-to-gguf.py dist\
          Compress-Archive -Path dist\* -Destination llama-p100-win2019-cuda118-static.zip
        shell: pwsh

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: llama-p100-win2019-cuda118-static
          path: llama-p100-win2019-cuda118-static.zip
